name: Daily News Report and Analyzer

on:
  schedule:
    # 21:30 UTC sama dengan 04:30 WIB (WIB = UTC+7)
    - cron: "30 21 * * *"
  workflow_dispatch: # Mengizinkan Anda menjalankan skrip secara manual dari UI GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-state: "pip"
          python-version: "3.11" # Versi Python yang stabil untuk Playwright dan Google GenAI

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          # Menginstal browser Chromium yang dibutuhkan oleh Playwright beserta dependensi sistemnya
          playwright install chromium --with-deps

      - name: Run Scraper Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEB_APP_SCRIPT_URL: ${{ secrets.WEB_APP_SCRIPT_URL }}
        run: |
          python main.py
