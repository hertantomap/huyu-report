name: Daily News Report and Analyzer

on:
  schedule:
    # 21:30 UTC sama dengan 04:30 WIB (WIB = UTC+7)
    - cron: "30 21 * * *"
  workflow_dispatch: # Mengizinkan Anda menjalankan skrip secara manual dari UI GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Mengaktifkan caching otomatis untuk mempercepat run berikutnya

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install chromium --with-deps

      - name: Install Playwright System Dependencies (If Cache Hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          playwright install-deps chromium

      # --- PERBAIKAN OTOMATIS: DOWNLOAD OVPN INDONESIA DENGAN STRATEGI CADANGAN ---
      - name: Download Latest Indonesia OVPN Profile
        run: |
          sudo apt-get update && sudo apt-get install -y openvpn curl dos2unix
          
          printenv
          echo "[-] Mengambil list VPN harian dari VPNGate..."
          # Download list API dan bersihkan format baris Windows ke Linux (\r\n ke \n)
          curl -sL http://www.vpngate.net/api/iphone/ | dos2unix > vpngate_list.txt
          
          # Cari baris yang mengandung negara Indonesia (ID). 
          # Kita ambil opsi ke-2 atau ke-3 jika opsi pertama mati.
          if grep -q ",ID," vpngate_list.txt; then
            # Mengambil server Indonesia baris pertama yang valid, ambil kolom ke-15 (Base64), lalu decode
            grep ",ID," vpngate_list.txt | head -n 1 | cut -d, -f15 | base64 -d > id-config.ovpn
            echo "[+] Berhasil mengunduh server Utama Indonesia."
          else
            echo "[!] Tidak ditemukan server Indonesia di daftar utama. Mencoba server Asia terdekat (SG)..."
            grep ",SG," vpngate_list.txt | head -n 1 | cut -d, -f15 | base64 -d > id-config.ovpn
          fi
        continue-on-error: true
  
      # --- MENJALANKAN OPENVPN DENGAN LOG FILTER UNTUK DEBUGGING ---
      - name: Connect to Indonesia VPN
        run: |
          # Jalankan openvpn dengan bypass cert check jika server gratisan memiliki cert expired
          sudo openvpn --config id-config.ovpn --status vpn-status.log --daemon
          
          echo "[-] Menunggu 15 detik agar jabat tangan (handshake) VPN selesai..."
          sleep 15
          
          echo "[-] Memeriksa status IP publik baru setelah VPN menyala:"
          # Cek IP. Jika VPN berhasil, IP akan berubah ke Indonesia/Singapura.
          # Ditambahkan timeout 10 detik agar jika VPN macet, GitHub Actions tidak stuck selamanya.
          curl --max-time 10 https://ifconfig.me || echo "[!] Gagal memuat IP, mencoba alternatif..."
          curl --max-time 10 https://api.ipify.org || echo "[!] VPN tidak memberikan akses internet."
        continue-on-error: true

      - name: Run Scraper Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEB_APP_SCRIPT_URL: ${{ secrets.WEB_APP_SCRIPT_URL }}
        run: |
          python main.py
