name: Daily News Report and Analyzer

on:
  schedule:
    # 21:30 UTC sama dengan 04:30 WIB (WIB = UTC+7)
    - cron: "30 21 * * *"
  workflow_dispatch: # Mengizinkan Anda menjalankan skrip secara manual dari UI GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Mengaktifkan caching otomatis untuk mempercepat run berikutnya

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install chromium --with-deps

      - name: Install Playwright System Dependencies (If Cache Hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          playwright install-deps chromium

      # --- OTOMATIS CARI & DOWNLOAD OVPN INDONESIA YANG AKTIF ---
      - name: Download Latest Indonesia OVPN Profile
        run: |
          sudo apt-get update && sudo apt-get install -y openvpn curl
          # Mengambil daftar server dari API VPNGate, memfilter negara Indonesia (ID), 
          # mengambil server teratas (paling stabil), dekode dari Base64, lalu simpan jadi id-config.ovpn
          curl -s http://www.vpngate.net/api/iphone/ | grep -m 1 ",ID," | cut -d, -f15 | base64 -d > id-config.ovpn
          echo "[+] Berhasil mengunduh config OVPN Indonesia terbaru harian."
        continue-on-error: true

      # --- JALANKAN OPENVPN DI LATAR BELAKANG ---
      - name: Connect to Indonesia VPN
        run: |
          sudo openvpn --config id-config.ovpn --daemon
          echo "[-] Menunggu 10 detik agar koneksi VPN terbentuk..."
          sleep 10
        continue-on-error: true

      - name: Run Scraper Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEB_APP_SCRIPT_URL: ${{ secrets.WEB_APP_SCRIPT_URL }}
        run: |
          python main.py
