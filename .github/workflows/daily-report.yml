name: Daily News Report and Analyzer

on:
  schedule:
    # 21:30 UTC sama dengan 04:30 WIB (WIB = UTC+7)
    - cron: "30 21 * * *"
  workflow_dispatch: # Mengizinkan Anda menjalankan skrip secara manual dari UI GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Mengaktifkan caching otomatis untuk mempercepat run berikutnya

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install chromium --with-deps

      - name: Install Playwright System Dependencies (If Cache Hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          playwright install-deps chromium

      #--- PERBAIKAN 1: DOWNLOAD OVPN DENGAN PROTOKOL RELEVAN ---
      - name: Download Latest Indonesia OVPN Profile
        run: |
          sudo apt-get update && sudo apt-get install -y openvpn curl dos2unix
          echo "[-] Mengambil list VPN harian dari VPNGate..."
          curl -sL http://www.vpngate.net/api/iphone/ | dos2unix > vpngate_list.txt
          
          # Cari server Indonesia (ID). Kita bersihkan baris agar formatnya sempurna.
          if grep -q ",ID," vpngate_list.txt; then
            grep ",ID," vpngate_list.txt | head -n 1 | cut -d, -f15 | base64 -d > id-config.ovpn
            echo "[+] Berhasil mengunduh server Utama Indonesia."
          else
            echo "[!] Server Indonesia kosong, beralih ke Singapura (SG)..."
            grep ",SG," vpngate_list.txt | head -n 1 | cut -d, -f15 | base64 -d > id-config.ovpn
          fi
        continue-on-error: true
  
      # --- PERBAIKAN 2: FORCE CREATE TUN DEVICE & START OPENVPN ---
      - name: Connect to Indonesia VPN (With TUN Fix)
        run: |
          # Membuat TUN device secara manual karena GitHub Actions membatasinya secara default
          sudo mkdir -p /dev/net
          if [ ! -c /dev/net/tun ]; then
            sudo mknod /dev/net/tun c 10 200
            sudo chmod 600 /dev/net/tun
          fi
  
          # Modifikasi file .ovpn agar mengabaikan kesalahan sertifikat bawaan & otomatis redirect-gateway
          echo "auth-user-pass /dev/null" >> id-config.ovpn
          echo "redirect-gateway def1" >> id-config.ovpn
          echo "cipher AES-128-CBC" >> id-config.ovpn
          
          # Jalankan OpenVPN secara background (--daemon) dan catat lognya
          sudo openvpn --config id-config.ovpn --log vpn-execution.log --status vpn-status.log --daemon
          
          echo "[-] Menunggu 20 detik agar VPN melakukan jabat tangan (handshake) sempurna..."
          sleep 20
          
          # Cetak log VPN untuk melihat apakah ada error AUTH, TLS, atau Connected
          echo "=== LOG EKSEKUSI OPENVPN ==="
          cat vpn-execution.log || true
          echo "============================"
  
          echo "[-] Memeriksa status IP publik baru setelah VPN menyala:"
          # Gunakan parameter --interface jika ingin memastikan rute dilempar ke tun0
          curl --max-time 15 https://ifconfig.me || echo "[!] Gagal memuat IP dari server utama."
          curl --max-time 15 https://api.ipify.org || echo "[!] VPN tidak merespon akses internet."
        continue-on-error: true

      - name: Run Scraper Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEB_APP_SCRIPT_URL: ${{ secrets.WEB_APP_SCRIPT_URL }}
        run: |
          python main.py
