name: Daily News Report and Analyzer

on:
  schedule:
    # 21:30 UTC sama dengan 04:30 WIB (WIB = UTC+7)
    - cron: "30 21 * * *"
  workflow_dispatch: # Mengizinkan Anda menjalankan skrip secara manual dari UI GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Mengaktifkan caching otomatis untuk mempercepat run berikutnya

      - name: Install Dependencies
        id: install-pip
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Mengambil versi playwright yang terinstal untuk penamaan cache
          echo "PLAYWRIGHT_VERSION=$(pip show playwright | grep Version | cut -d' ' -f2)" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install chromium --with-deps

      - name: Run Scraper Script
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEB_APP_SCRIPT_URL: ${{ secrets.WEB_APP_SCRIPT_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        timeout-minutes: 90
        run: |
          python main.py
